[plugin]
version = "1.0.0"

[budget]
max_tokens_per_feature = 100000   # alerta no Arquiteto se ultrapassar numa única feature
max_cost_per_day_usd = 50.0       # encerra calls subsequentes; força decanting do que está em curso
warning_threshold = 0.8            # avisa em 80% do limite

[resilience]
retry_attempts = 3
retry_backoff_initial_ms = 1000
retry_backoff_max_ms = 30000
retry_jitter = true
circuit_breaker_failures = 3
circuit_breaker_reset_seconds = 300

[fallback]
opus_to_sonnet = true
sonnet_to_haiku = true

[observability]
otel_enabled = true
otel_local_path = "logs/otel"
otel_exporter_endpoint = ""  # ou variável de ambiente OTEL_EXPORTER_OTLP_ENDPOINT

[dashboard]
port = 8765
auto_open_browser = true
theme = "dark"  # dark | light | auto

[i18n]
default_locale = "pt-BR"
fallback_locale = "en"

[guardrails]
block_force_push_to_main = true
block_rm_rf_outside_project = true
block_secret_commit = true
block_identity_change_without_flag = true

[trust]
default_score = 50
weights = { accepted = 5, accepted_with_minor_note = 3, rework_minor = 1, rework_major = -3, rejected = -7, decanting_skipped = -10 }

[multiturn]
# Quando especialista precisa continuar conversa durante a feature:
# - "sendmessage": usa SendMessage se Claude Code v2.1.77+ e env var set
# - "agent_call": sempre nova call do Agent tool lendo handoff
# - "auto": detecta capacidade e escolhe (default)
strategy = "auto"

[thinking]
# Extended thinking adaptativo (CA-207). O Arquiteto modula a profundidade de
# raciocínio pelo peso da decisão:
# - "adaptive": fundo em decisões de arquitetura/irreversíveis, raso no resto (default)
# - "always": sempre fundo (mais lento/caro)
# - "off": sem extended thinking
mode = "adaptive"

[notify]
# Notificações opt-in (CA-302/304). Deixe vazio para desligar. Env vars
# (TELEGRAM_BOT_TOKEN/CHAT_ID, SLACK_WEBHOOK_URL) sobrescrevem estes valores.
enabled = true
telegram_bot_token = ""
telegram_chat_id = ""
slack_webhook_url = ""

[voice]
# Entrada por voz local (CA-300) via faster-whisper (opt-in; não é dep do mad).
# Instale com: pip install faster-whisper
enabled = false
model = "small"

[models]
# Fallback de modelo (CA-042) e Ollama (CA-305). O despacho de modelo é do
# Claude Code; estas chaves são preferências/diretrizes para o Arquiteto.
opus_to_sonnet = true
sonnet_to_haiku = true
# Ollama (LLM local via API OpenAI-compatible) — roadmap; preencha para habilitar.
ollama_base_url = ""   # ex: http://localhost:11434/v1
ollama_model = ""      # ex: llama3.1

[workflow]
# Autonomia do loop (v1.4+). Por padrão o sistema AGE e flui; não fica ocioso
# esperando o usuário. Só para em bifurcação crítica ou se o usuário pedir pausa.
# confirm_irreversible=true reativa a trava de aprovação humana para itens
# irreversíveis (mais cauteloso, menos fluido).
confirm_irreversible = false
