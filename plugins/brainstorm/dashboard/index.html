<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ideation Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/force-graph"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/umap-js"></script>
</head>
<body data-theme="dark">

  <!-- =================== HEADER =================== -->
  <header id="topbar">
    <div class="brand">
      <div class="logo-dot"></div>
      <div class="brand-text">
        <div class="brand-title">Ideation Live</div>
        <div class="brand-sub" id="topicLabel">—</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">run</span>
        <span class="stat-val" id="runIdLabel">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">tier</span>
        <span class="stat-val" id="tierLabel">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">phase</span>
        <span class="stat-val pulse-on-change" id="phaseLabel">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">round</span>
        <span class="stat-val pulse-on-change" id="roundLabel">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">elapsed</span>
        <span class="stat-val" id="elapsedLabel">0s</span>
      </div>
      <div class="stat">
        <span class="stat-label">ideas</span>
        <span class="stat-val" id="ideasCountLabel">0</span>
      </div>
    </div>

    <div id="coverageGaugeBox"><div id="coverageGauge"></div></div>

    <div class="controls">
      <button class="drawer-btn" data-drawer="umap" title="Semantic UMAP">UMAP</button>
      <button class="drawer-btn" data-drawer="parallel" title="Parallel Coordinates">Parallel</button>
      <button class="drawer-btn" data-drawer="coverage" title="Coverage Heatmap">Coverage</button>
      <button class="drawer-btn" data-drawer="lineage" title="Lineage Tree">Lineage</button>
      <button id="themeToggle" title="Toggle theme">&#9788;</button>
    </div>
  </header>

  <!-- =================== MAIN =================== -->
  <main>
    <!-- Center: force graph -->
    <section id="graphSection">
      <div id="graphCanvas"></div>
      <div id="emptyState" class="empty-state">
        <div class="spinner"></div>
        <div class="empty-msg">Waiting for first ideas...</div>
      </div>
      <div id="toastStack"></div>
    </section>

    <!-- Right column -->
    <aside id="sidePanels">
      <section class="panel" id="agentsPanel">
        <header class="panel-header">
          <h2>Agents</h2>
          <span class="panel-count" id="agentsCount">0</span>
        </header>
        <div class="panel-body" id="agentsList"></div>
      </section>

      <section class="panel breathing" id="topIdeasPanel">
        <header class="panel-header">
          <h2>Top Ideas</h2>
          <span class="panel-count">elo</span>
        </header>
        <div class="panel-body" id="topIdeasList"></div>
      </section>

      <section class="panel" id="gapsPanel">
        <header class="panel-header">
          <h2>Structural Gaps</h2>
          <span class="panel-count" id="gapsCount">0</span>
        </header>
        <div class="panel-body" id="gapsList"></div>
      </section>
    </aside>
  </main>

  <!-- =================== FOOTER (timeline) =================== -->
  <footer id="timelineBar">
    <div id="timeline"></div>
  </footer>

  <!-- =================== DRAWERS =================== -->
  <div class="drawer" id="drawer-umap">
    <div class="drawer-header">
      <h3>Semantic UMAP</h3>
      <button class="drawer-close" data-close="umap">x</button>
    </div>
    <div class="drawer-body">
      <div id="umapChart" class="drawer-chart"></div>
    </div>
  </div>

  <div class="drawer" id="drawer-parallel">
    <div class="drawer-header">
      <h3>Parallel Coordinates</h3>
      <button class="drawer-close" data-close="parallel">x</button>
    </div>
    <div class="drawer-body">
      <div id="parallelChart" class="drawer-chart"></div>
    </div>
  </div>

  <div class="drawer" id="drawer-coverage">
    <div class="drawer-header">
      <h3>Coverage Heatmap (MAP-Elites)</h3>
      <button class="drawer-close" data-close="coverage">x</button>
    </div>
    <div class="drawer-body">
      <div id="coverageHeatmap" class="drawer-chart"></div>
    </div>
  </div>

  <div class="drawer" id="drawer-lineage">
    <div class="drawer-header">
      <h3>Lineage Tree <small id="lineageFocus"></small></h3>
      <button class="drawer-close" data-close="lineage">x</button>
    </div>
    <div class="drawer-body">
      <div id="lineageTree" class="drawer-chart"></div>
    </div>
  </div>

  <div class="drawer-scrim" id="drawerScrim"></div>

  <script src="./app.js"></script>
</body>
</html>
